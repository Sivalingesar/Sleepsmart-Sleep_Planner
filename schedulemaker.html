<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electric Sleep Planner</title>
  <style>
    /* CSS Variables from Electric Border */
    :root {
      --electric-border-color: #02A2F8;
      --electric-light-color: oklch(from var(--electric-border-color) l c h);
      --gradient-color: oklch(from var(--electric-border-color) 0.3 calc(c / 2) h / 0.4);
      --color-neutral-900: oklch(0.185 0 0);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: transparent; /* Dark background to see the effects */
      color: #f8fafc;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Main container and SVG positioning */
    .main-container { display: flex; align-items: center; justify-content: center; position: relative; }
    .svg-container { position: absolute; width: 0; height: 0; }

    /* Card container */
    .card-container {
      padding: 2px;
      border-radius: 24px;
      position: relative;
      background: linear-gradient(-30deg, var(--gradient-color), transparent, var(--gradient-color)),
                  linear-gradient(to bottom, var(--color-neutral-900), var(--color-neutral-900));
    }

    .border-outer {
      border: 2px solid #02A2F8;
      border-radius: 24px;
      padding-right: 4px;
      padding-bottom: 4px;
    }

    /* The animated background card */
    .main-card {
      width: 450px;
      min-height: 550px;
      border-radius: 24px;
      border: 2px solid var(--electric-border-color);
      margin-top: -4px;
      margin-left: -4px;
      filter: url(#turbulent-displace);
      background: #16689433; /* Semi-transparent background */
    }

    .glow-layer-2 {
      border: 2px solid var(--electric-light-color);
      border-radius: 24px;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
      filter: blur(4px);
    }

    .background-glow {
      position: absolute;
      width: 100%; height: 100%;
      top: 0; left: 0;
      border-radius: 24px;
      filter: blur(32px);
      transform: scale(1.1);
      opacity: 0.3;
      z-index: -1;
      background: linear-gradient(-30deg, var(--electric-light-color), transparent, var(--electric-border-color));
    }

    /* Content Styling (Your Planner) */
    .content-container {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      padding: 2rem;
      z-index: 10;
      overflow-y: auto;
    }

    h2 { color: #ffffff; margin-bottom: 1rem; font-size: 1.8rem; text-align: center; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 500; opacity: 0.8; text-align: center;}

    input[type="time"] {
      width: 100%;
      padding: 0.75rem;
      border-radius: 0.5rem;
      border: 1px solid rgba(2, 162, 248, 0.3);
      background: rgba(18, 83, 118, 0.6);
      color: white;
      font-size: 1.2rem;
      margin-bottom: 1rem;
      outline: none;
    }

    button {
      background-color: var(--electric-border-color);
      color: #ffffff;
      border: none;
      padding: 0.85rem;
      border-radius: 0.5rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(2, 162, 248, 0.3);
    }
    button:hover { background-color: #38bdf8; transform: translateY(-2px); }

    #results { margin-top: 1.5rem; }
    .result-item {
      background: rgba(22, 104, 148, 0.4);
      padding: 0.8rem;
      border-radius: 0.5rem;
      margin-bottom: 0.6rem;
      border-left: 4px solid var(--electric-border-color);
      backdrop-filter: blur(5px);
    }
    .time-bold { font-weight: bold; font-size: 1.1rem; color: #38bdf8; }
    .small { font-size: 0.85rem; color: #94a3b8; }

    /* Custom Scrollbar for the glass container */
    .content-container::-webkit-scrollbar { width: 5px; }
    .content-container::-webkit-scrollbar-thumb { background: var(--electric-border-color); border-radius: 10px; }
  </style>
</head>
<body>

<main class="main-container">
  <svg class="svg-container">
    <defs>
      <filter id="turbulent-displace" colorInterpolationFilters="sRGB" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="10" result="noise1" seed="1" />
        <feOffset in="noise1" dx="0" dy="0" result="offsetNoise1">
          <animate attributeName="dy" values="700; 0" dur="6s" repeatCount="indefinite" calcMode="linear" />
        </feOffset>
        <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="10" result="noise2" seed="1" />
        <feOffset in="noise2" dx="0" dy="0" result="offsetNoise2">
          <animate attributeName="dy" values="0; -700" dur="6s" repeatCount="indefinite" calcMode="linear" />
        </feOffset>
        <feComposite in="offsetNoise1" in2="offsetNoise2" result="part1" />
        <feBlend in="part1" in2="part1" mode="color-dodge" result="combinedNoise" />
        <feDisplacementMap in="SourceGraphic" in2="combinedNoise" scale="30" xChannelSelector="R" yChannelSelector="B" />
      </filter>
    </defs>
  </svg>

  <div class="card-container">
    <div class="inner-container">
      <div class="border-outer">
        <div class="main-card"></div>
      </div>
      <div class="glow-layer-2"></div>
    </div>
    <div class="background-glow"></div>

    <div class="content-container">
        <h2>Sleep Planner</h2>
        <label for="wakeTime">When do you need to wake up?</label>
        <input type="time" id="wakeTime" value="07:00">
        
        <button onclick="calculateSleep()">Calculate Bedtimes</button>

        <div id="results"></div>
    </div>
  </div>
</main>

<script>
    function calculateSleep() {
        const timeInput = document.getElementById('wakeTime').value;
        if (!timeInput) return;

        const [hours, minutes] = timeInput.split(':');
        const wakeDate = new Date();
        wakeDate.setHours(hours, minutes, 0);

        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '<h3 style="margin-bottom:0.8rem; font-size:1rem; opacity:0.7;">Suggested Bedtimes:</h3>';

        const sleepLatency = 15; 
        const options = [
            { mins: 540, label: "Peak Performance (9h)" },
            { mins: 480, label: "Optimal (8h)" },
            { mins: 420, label: "Minimum (7h)" }
        ];

        options.forEach(opt => {
            const bedtime = new Date(wakeDate.getTime());
            bedtime.setMinutes(bedtime.getMinutes() - opt.mins - sleepLatency);
            const timeString = bedtime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            resultsDiv.innerHTML += `
                <div class="result-item">
                    <div class="time-bold">${timeString}</div>
                    <div class="small">${opt.label}</div>
                </div>
            `;
        });
    }
</script>

</body>
</html>
